# office_map.yaml — Nav2 Map Metadata
# =====================================
# This file is generated by map_saver_cli after your SLAM mapping run.
# It describes the saved occupancy grid image (office_map.pgm).
#
# To regenerate:
#   1. ros2 launch delivery_robot slam_launch.py
#   2. Drive the robot through all rooms
#   3. ros2 run nav2_map_server map_saver_cli -f <path>/maps/office_map
#
# The values below are placeholders — the real values will be written
# by map_saver_cli based on your actual SLAM result.

image: office_map.pgm
mode: trinary

# Resolution: metres per pixel (matches slam_params.yaml)
resolution: 0.05

# Origin: (x, y, yaw) of the lower-left pixel in map frame
origin: [-0.5, -0.5, 0.0]

# Thresholds for interpreting grey values in the .pgm
negate: 0
occupied_thresh: 0.65
free_thresh: 0.25
